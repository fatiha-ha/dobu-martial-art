<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoBu Martial Arts - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="nav-logo login-card-logo">
      <div class="logo-circle"></div>
      <div class="logo-text">
        <span class="logo-name">DOBU</span>
        <span class="logo-tagline">MARTIAL ARTS</span>
      </div>
    </div>

    <h2 class="login-card-title">MEMBER LOGIN</h2>
    <p class="login-subtitle">Sign in to book classes and manage your account</p>

    <input type="text" id="username" placeholder="Username" class="login-input">
    <input type="password" id="password" placeholder="Password" class="login-input">
    <button onclick="login()" class="btn btn-yellow login-btn">LOGIN</button>
    <p id="message" class="login-error"></p>
    <p class="login-footer">
      Don't have an account? <a href="register.html" class="login-link">Register</a>
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
