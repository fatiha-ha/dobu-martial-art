<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoBu Martial Arts – Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">
  <div class="nav-logo login-card-logo">
    <div class="logo-circle"></div>
    <div class="logo-text">
      <span class="logo-name">DOBU</span>
      <span class="logo-tagline">MARTIAL ARTS</span>
    </div>
  </div>

  <h2 class="login-card-title">CREATE ACCOUNT</h2>
  <p class="login-subtitle">Join DoBu Martial Arts today</p>

  <input type="text" placeholder="Full Name" class="login-input">
  <input type="text" placeholder="Username" class="login-input">
  <input type="password" placeholder="Password" class="login-input">
  <input type="password" placeholder="Confirm Password" class="login-input">
  <button class="btn btn-yellow login-btn">CREATE ACCOUNT</button>
  <p class="login-footer">
    Already have an account? <a href="login.html" class="login-link">Login</a>
  </p>
</div>

</body>
</html>
